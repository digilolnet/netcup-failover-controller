apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "netcup-failover-controller.name" . }}
  labels:
    {{- include "netcup-failover-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [netcup.digilol.net]
    resources: [netcupfailoverips]
    verbs: [get, list, watch]
  - apiGroups: [netcup.digilol.net]
    resources: [netcupfailoverips/status]
    verbs: [patch, update]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "netcup-failover-controller.name" . }}
  labels:
    {{- include "netcup-failover-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "netcup-failover-controller.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "netcup-failover-controller.name" . }}
    namespace: {{ .Values.namespace }}
