apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netcup-failover-controller
rules:
  - apiGroups: [netcup.digilol.net]
    resources: [netcupfailoverips]
    verbs: [get, list, watch]
  - apiGroups: [netcup.digilol.net]
    resources: [netcupfailoverips/status]
    verbs: [patch, update]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
