name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/digilolnet/netcup-failover-controller

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/manager-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/manager-linux-arm64 .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set chart version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          yq -i ".version = \"${TAG}\"" charts/netcup-failover-controller/Chart.yaml
          yq -i ".appVersion = \"${GITHUB_REF_NAME}\"" charts/netcup-failover-controller/Chart.yaml

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/netcup-failover-controller

      - name: Publish chart to gh-pages
        run: |
          helm package charts/netcup-failover-controller --destination /tmp/packages
          git worktree add /tmp/gh-pages gh-pages
          cp /tmp/packages/*.tgz /tmp/gh-pages/
          helm repo index /tmp/gh-pages --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          cd /tmp/gh-pages
          git add .
          git diff --staged --quiet || git commit -m "Release ${{ github.ref_name }}"
          git push origin gh-pages
